services:
  postgres:
    image: postgres:16-alpine
    container_name: pharma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pharma}
      POSTGRES_USER: ${DB_USERNAME:-pharma}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pharma} -d ${DB_DATABASE:-pharma}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
